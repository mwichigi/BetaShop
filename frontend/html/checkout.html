<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout – βetaShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand" onclick="window.location.href='index.html'">βetaShop</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn cart-btn" onclick="window.location.href='checkout.html'">🛒 <span class="cart-count" id="cartCount">0</span></button>
      <a href="auth.html" class="btn-signin">Sign In</a>
    </div>
  </nav>

  <div class="cart-page" style="padding: 2rem; max-width: 1000px; margin: 0 auto;">
    <h1>Checkout</h1>
    <p class="section-subtitle">Review your selected products and proceed to payment.</p>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
      <!-- Cart Items -->
      <div>
        <h2>Order Items</h2>
        <div id="checkoutItems" style="display: grid; gap: 1rem;"></div>
      </div>
      
      <!-- Payment Section -->
      <div>
        <div id="checkoutSummary" class="cart-summary" style="display: none; padding: 1.5rem; border: 1px solid var(--border); border-radius: 18px; background: var(--surface);"></div>
        <div id="paymentSection" style="margin-top: 2rem; padding: 1.5rem; border: 1px solid var(--border); border-radius: 18px; background: var(--surface);">
          <h3>Payment Method</h3>
          <div style="margin-top: 1rem;">
            <label style="display: block; margin-bottom: 1rem;">
              <input type="radio" name="payment" value="mpesa" checked style="margin-right: 0.5rem;"/>
              M-Pesa Payment
            </label>
            <div id="mpesaForm" style="margin-top: 1rem;">
              <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Phone Number</label>
              <input type="tel" id="mpesaPhone" placeholder="07XXXXXXXX or 2547XXXXXXXX" 
                style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem;"/>
              <button id="mpesaPayBtn" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem; border: none; cursor: pointer;">
                Pay Ksh <span id="totalAmount">0.00</span> with M-Pesa
              </button>
            </div>
          </div>
          <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 1rem;">
            For testing M-Pesa STK Push functionality. Authentication is optional for this test.
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/chat.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/order.js"></script>
  <script src="../js/checkout.js"></script>
</body>
</html>
